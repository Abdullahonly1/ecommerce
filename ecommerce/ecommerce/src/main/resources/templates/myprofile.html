<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - MyShop</title>
    <link href="/webjars/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4e9 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .profile-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .profile-header {
            background: linear-gradient(90deg, #ff69b4, #ff1493);
            color: white;
            padding: 60px 30px;
            border-radius: 20px 20px 0 0;
            text-align: center;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
            position: relative;
            overflow: hidden;
        }

        .profile-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: #ff69b4;
        }

        .profile-header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin: 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.4);
        }

        .profile-body {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .welcome-msg {
            font-size: 1.8rem;
            font-weight: 600;
            color: #ff1493;
            margin-bottom: 10px;
        }

        .user-info {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 30px;
        }

        .quick-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .quick-link {
            background: #fff5f8;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .quick-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.2);
            background: #ffe4e9;
        }

        .quick-link i {
            font-size: 2rem;
            color: #ff69b4;
            margin-bottom: 10px;
        }

        .quick-link span {
            font-weight: 600;
        }

        .logout-btn {
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            border: none;
            color: white;
            font-size: 1.1rem;
            padding: 12px 40px;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4);
        }

        @media (max-width: 768px) {
            .profile-header h1 { font-size: 2.2rem; }
            .profile-header { padding: 50px 20px 30px; }
            .avatar { width: 100px; height: 100px; font-size: 3rem; }
        }
    </style>
</head>
<body>
<div class="profile-container">
    <div class="profile-header">
        <div class="avatar">
            <i class="fas fa-user"></i>
        </div>
        <h1>My Profile</h1>
    </div>

    <div class="profile-body">
        <h3 class="welcome-msg">
            Welcome back, <span th:text="${#authentication?.name} ?: 'Friend'">User</span>!
        </h3>

        <p class="user-info">
            We're glad you're here! Manage your shopping, orders, and wishlist easily.
        </p>

        <div class="quick-links">
            <a href="/orders" class="quick-link">
                <i class="fas fa-box-open"></i>
                <span>My Orders</span>
            </a>
            <a href="/wishlist" class="quick-link">
                <i class="fas fa-heart"></i>
                <span>Wishlist</span>
            </a>
            <a href="/cart" class="quick-link">
                <i class="fas fa-shopping-cart"></i>
                <span>My Cart</span>
            </a>
            <a href="/addresses" class="quick-link">
                <i class="fas fa-map-marker-alt"></i>
                <span>Addresses</span>
            </a>
            <a href="/settings" class="quick-link">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </a>
        </div>

        <a href="/logout" class="btn logout-btn">
            <i class="fas fa-sign-out-alt me-2"></i> Logout
        </a>

        <div class="text-center mt-4">
            <a href="/" class="btn btn-outline-primary">
                <i class="fas fa-home me-2"></i> Back to Home
            </a>
        </div>
    </div>
</div>

<script src="/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
