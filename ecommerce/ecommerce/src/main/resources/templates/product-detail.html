<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${product.name} + ' - MyShop'">Product Detail - MyShop</title>
    <link href="/webjars/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff69b4;
            --primary-dark: #ff1493;
            --dark: #111;
            --light: #fff5f8;
        }
        body {
            background: linear-gradient(135deg, var(--light), #fffaf5);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: var(--dark);
            margin: 0;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(90deg, var(--primary), var(--primary-dark)) !important;
            box-shadow: 0 6px 25px rgba(255,105,180,0.35);
            padding: 1.2rem 0;
        }
        .navbar-brand {
            font-weight: 900;
            font-size: 2.1rem;
            color: white !important;
        }

        /* Product Image + Animation */
        .product-img-container {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.12);
            transition: all 0.5s ease;
            animation: fadeInLeft 1.2s ease;
        }
        .product-img-container:hover {
            transform: scale(1.04);
            box-shadow: 0 30px 70px rgba(255,105,180,0.3);
        }
        .product-img {
            width: 100%;
            height: auto;
            transition: transform 0.6s ease;
        }
        .product-img-container:hover .product-img {
            transform: scale(1.15);
        }

        /* Product Info */
        .product-title {
            font-size: 3.2rem;
            font-weight: 900;
            color: var(--primary-dark);
            margin-bottom: 1rem;
            animation: fadeInUp 1s ease 0.3s forwards;
            opacity: 0;
        }
        .price-tag {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInUp 1s ease 0.5s forwards;
            opacity: 0;
        }
        .description {
            font-size: 1.25rem;
            color: #555;
            line-height: 1.7;
            animation: fadeInUp 1s ease 0.7s forwards;
            opacity: 0;
        }

        /* Stock Badge + Pulse Animation */
        .stock-badge {
            font-size: 1.4rem;
            padding: 12px 28px;
            border-radius: 50px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            display: inline-block;
            animation: fadeInUp 1s ease 0.9s forwards, pulseSlow 3s infinite;
            opacity: 0;
        }
        @keyframes pulseSlow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .bg-danger { background: #f8d7da !important; color: #721c24; }
        .bg-warning { background: #fff3cd !important; color: #856404; }
        .bg-success { background: #d4edda !important; color: #155724; }

        /* Buttons */
        .btn-pink {
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            border: none;
            font-size: 1.4rem;
            padding: 14px 40px;
            border-radius: 50px;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(255,105,180,0.3);
            position: relative;
            overflow: hidden;
        }
        .btn-pink:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 45px rgba(255,105,180,0.5);
        }
        .btn-pink:active {
            animation: bounce 0.4s ease;
        }
        @keyframes bounce {
            0% { transform: scale(1); }
            40% { transform: scale(1.1); }
            70% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        .btn-pink:disabled {
            background: #ccc !important;
            cursor: not-allowed;
            box-shadow: none;
        }

        .wishlist-btn {
            font-size: 2rem;
            transition: all 0.3s;
            animation: fadeInRight 1s ease 1.1s forwards;
            opacity: 0;
        }
        .wishlist-btn:hover {
            transform: scale(1.25);
        }
        .heart-icon {
            transition: transform 0.3s;
        }
        .wishlist-btn:active .heart-icon {
            animation: heartBeat 0.6s ease;
        }
        @keyframes heartBeat {
            0% { transform: scale(1); }
            40% { transform: scale(1.3); }
            60% { transform: scale(1); }
            80% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        /* Group Buy & Back Button */
        .group-buy-btn {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            font-weight: 700;
            border-radius: 50px;
            padding: 1rem 2rem;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(40,167,69,0.3);
            animation: fadeInUp 1s ease 1.3s forwards;
            opacity: 0;
        }
        .group-buy-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(40,167,69,0.5);
        }

        .login-to-group {
            background: linear-gradient(45deg, #6c757d, #495057);
            color: white;
            font-weight: 700;
            border-radius: 50px;
            padding: 1rem 2rem;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(108,117,125,0.3);
            animation: fadeInUp 1s ease 1.3s forwards;
            opacity: 0;
        }
        .login-to-group:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(108,117,125,0.5);
        }

        .back-btn {
            border-radius: 50px;
            transition: all 0.3s;
            animation: fadeInUp 1s ease 1.4s forwards;
            opacity: 0;
        }
        .back-btn:hover {
            background: var(--primary) !important;
            color: white !important;
            transform: translateY(-3px);
        }

        /* Animations */
        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="/">MyShop</a>
    </div>
</nav>

<div class="container my-5">
    <div class="row align-items-center g-5">
        <div class="col-md-6">
            <div class="product-img-container">
                <img th:src="${product.imageUrl}" class="img-fluid product-img" alt="Product">
            </div>
        </div>

        <div class="col-md-6">
            <h1 class="product-title" th:text="${product.name}">Product Name</h1>

            <p class="price-tag mb-4">৳ <span th:text="${product.price}">0</span></p>

            <p class="lead text-muted mb-4 description" th:text="${product.description}">Description here</p>

            <!-- স্টক দেখানো (প্রথম কোডের logic) -->
            <div class="stock-badge mb-4"
                 th:classappend="${stock <= 0 ? 'bg-danger text-white' : (stock <= 5 ? 'bg-warning text-dark' : 'bg-success text-white')}">
                <span th:if="${stock <= 0}">Out of Stock</span>
                <span th:if="${stock > 0 and stock <= 5}">Low Stock: <span th:text="${stock}">0</span> left</span>
                <span th:if="${stock > 5}">In Stock: <span th:text="${stock}">0</span> available</span>
            </div>

            <div class="d-flex gap-4 mt-5">
                <!-- Add to Cart (প্রথম কোডের logic) -->
                <button type="button"
                        class="add-to-cart-btn btn btn-pink btn-lg fw-bold flex-grow-1 rounded-pill shadow-lg"
                        th:data-id="${product.id}"
                        th:disabled="${stock <= 0}">
                    <span th:if="${stock <= 0}">Out of Stock</span>
                    <span th:unless="${stock <= 0}">Add to Cart</span>
                </button>

                <!-- Wishlist -->
                <button type="button" class="wishlist-btn btn btn-outline-danger btn-lg rounded-circle shadow-sm"
                        th:data-id="${product.id}" th:data-name="${product.name}"
                        th:data-price="${product.price}" th:data-image="${product.imageUrl}">
                    <span class="heart-icon">♡</span>
                </button>
            </div>

            <!-- Group Buy Section (দ্বিতীয় কোডের সুন্দর UI + logic) -->
            <div class="mt-5 text-center">
                <h5 class="mb-3 fw-bold text-primary">Group Buy Offer (15% off with friends!)</h5>

                <div th:if="${#authorization.expression('isAuthenticated()')}">
                    <a th:href="@{/group-buy/{id}(id=${product?.id})}"
                       th:if="${product?.id != null}"
                       class="group-buy-btn btn btn-lg w-100 shadow-lg">
                        <i class="fas fa-users me-2"></i> Start Group Buy
                    </a>
                    <p th:unless="${product?.id != null}" class="text-danger">Product ID missing</p>
                </div>

                <div th:unless="${#authorization.expression('isAuthenticated()')}">
                    <a th:href="@{/login(nextUrl=/group-buy/{id}(id=${product?.id}))}"
                       th:if="${product?.id != null}"
                       class="login-to-group btn btn-lg w-100 shadow-lg">
                        <i class="fas fa-sign-in-alt me-2"></i> Login to Start Group Buy
                    </a>
                    <p th:unless="${product?.id != null}" class="text-danger">Product ID missing</p>
                    <p class="mt-2 small text-muted">গ্রুপ বাই শুরু করতে লগইন করুন</p>
                </div>
            </div>

            <a href="/" class="btn btn-outline-secondary btn-lg w-100 mt-3 rounded-pill back-btn">
                <i class="fas fa-arrow-left me-2"></i> Back to Home
            </a>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>

<!-- Wishlist Heart -->
<script th:inline="javascript">
    document.querySelectorAll('.wishlist-btn').forEach(btn => {
        const productId = btn.dataset.id;
        let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        if (wishlist.some(p => p.id === productId)) {
            btn.querySelector('.heart-icon').textContent = '❤️';
        }

        btn.addEventListener('click', function() {
            const product = {
                id: this.dataset.id,
                name: this.dataset.name,
                price: this.dataset.price,
                imageUrl: this.dataset.image
            };

            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];

            if (wishlist.some(p => p.id === product.id)) {
                wishlist = wishlist.filter(p => p.id !== product.id);
                this.querySelector('.heart-icon').textContent = '♡';
            } else {
                wishlist.push(product);
                this.querySelector('.heart-icon').textContent = '❤️';
            }

            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            updateWishlistBadge();
        });
    });
</script>

<!-- Add to Cart AJAX -->
<script th:inline="javascript">
    function updateCartBadge() {
        fetch('/cart/count')
            .then(response => response.text())
            .then(data => {
                const badge = document.getElementById('cart-badge');
                const count = parseInt(data) || 0;
                badge.textContent = count;
                badge.style.display = count > 0 ? 'inline-block' : 'none';
            })
            .catch(err => console.log('Cart badge error:', err));
    }

    document.addEventListener('DOMContentLoaded', updateCartBadge);

    document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            if (this.disabled) return;

            const productId = this.dataset.id;

            fetch('/cart/add/' + productId, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(response => {
                if (response.ok) {
                    updateCartBadge();
                    alert('Added to Cart!');

                    // স্টক আপডেটের জন্য রিলোড
                    location.reload();
                } else {
                    alert('Failed to add to cart');
                }
            })
            .catch(err => {
                console.log('Add to cart error:', err);
                alert('Something went wrong');
            });
        });
    });
</script>

<!-- WebSocket for Real-time Stock -->
<script src="/webjars/sockjs-client/1.5.1/sockjs.min.js"></script>
<script src="/webjars/stomp-websocket/2.3.3-1/stomp.min.js"></script>

<script>
    var socket = new SockJS('/ws');
    var stompClient = Stomp.over(socket);

    stompClient.connect({}, function (frame) {
        console.log('WebSocket Connected:', frame);

        stompClient.subscribe('/topic/stock/' + ${product.id}, function (response) {
            var newStock = parseInt(response.body);
            console.log('Stock updated:', newStock);

            const stockDisplay = document.querySelector('.stock-badge span');
            if (stockDisplay) stockDisplay.textContent = newStock;

            const addBtn = document.querySelector('.add-to-cart-btn');
            if (addBtn) {
                if (newStock <= 0) {
                    addBtn.disabled = true;
                    addBtn.classList.remove('btn-pink');
                    addBtn.classList.add('btn-danger');
                    addBtn.innerHTML = 'Out of Stock';
                } else {
                    addBtn.disabled = false;
                    addBtn.classList.remove('btn-danger');
                    addBtn.classList.add('btn-pink');
                    addBtn.innerHTML = 'Add to Cart';
                }
            }
        });
    }, function (error) {
        console.error('WebSocket error:', error);
    });
</script>

</body>
</html>
