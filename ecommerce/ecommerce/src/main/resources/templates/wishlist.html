<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - MyShop</title>
    <link href="/webjars/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #fff5f8, #ffeef5);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .navbar {
            background: linear-gradient(90deg, #ff69b4, #ff1493) !important;
            box-shadow: 0 6px 25px rgba(255,105,180,0.35);
        }
        .navbar-brand {
            font-weight: 900;
            font-size: 2.1rem;
        }
        h1 {
            font-weight: 900;
            color: #ff1493;
            text-shadow: 0 2px 10px rgba(255,20,147,0.2);
            animation: fadeInDown 1s ease;
        }
        .card {
            border: none;
            border-radius: 18px;
            overflow: hidden;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: all 0.4s ease;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
        }
        .card.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 60px rgba(255,105,180,0.3);
        }
        .card-img-top {
            height: 260px;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .card:hover .card-img-top {
            transform: scale(1.12);
        }
        .card-title {
            font-weight: 700;
            font-size: 1.4rem;
            margin-bottom: 0.8rem;
        }
        .text-pink {
            color: #ff69b4;
            font-weight: 800;
            font-size: 1.5rem;
        }
        .remove-btn {
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 50px;
            padding: 0.6rem 1.8rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .remove-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255,71,87,0.4);
        }
        .remove-btn:active {
            animation: pulse 0.4s ease;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            40% { transform: scale(1.08); }
            70% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }
        .empty-wishlist {
            animation: fadeIn 1.5s ease;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-light {
            border-radius: 50px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="/">MyShop</a>
        <a class="btn btn-light rounded-pill px-4" href="/">Back to Home</a>
    </div>
</nav>

<div class="container my-5">
    <h1 class="text-center mb-5 fw-bold">My Wishlist ❤️</h1>

    <div id="wishlist-items" class="row row-cols-1 row-cols-md-3 g-4">
        <!-- JS দিয়ে প্রোডাক্ট লোড হবে -->
    </div>

    <div id="empty-wishlist" class="text-center py-5 empty-wishlist" style="display:none;">
        <img src="https://images.unsplash.com/photo-1593604352323-3c2dcee3f3d9?w=500"
             class="img-fluid cart-empty-img rounded shadow mb-4" alt="Empty Wishlist">
        <h3 class="text-muted mb-4">Your wishlist is empty!</h3>
        <a href="/" class="btn btn-pink btn-lg mt-3 rounded-pill shadow">Start Adding Products</a>
    </div>
</div>

<script th:inline="javascript">
    function loadWishlist() {
        const wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
        const container = document.getElementById('wishlist-items');
        const emptyMsg = document.getElementById('empty-wishlist');

        container.innerHTML = ''; // ক্লিয়ার করো

        if (wishlist.length === 0) {
            emptyMsg.style.display = 'block';
            return;
        }

        emptyMsg.style.display = 'none';

        wishlist.forEach((product, index) => {
            const card = `
                <div class="col">
                    <div class="card h-100 shadow-sm" style="animation-delay: ${index * 0.1}s;">
                        <img src="${product.imageUrl}" class="card-img-top" style="height: 260px; object-fit: cover;" alt="${product.name}">
                        <div class="card-body text-center">
                            <h5 class="card-title">${product.name}</h5>
                            <p class="text-pink fw-bold">৳ ${product.price}</p>
                            <button class="btn remove-btn btn-sm mt-2" data-id="${product.id}">
                                Remove from Wishlist
                            </button>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });

        // Remove বাটনের ক্লিক হ্যান্ডেল
        document.querySelectorAll('.remove-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const id = this.dataset.id;
                let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
                wishlist = wishlist.filter(p => p.id != id);
                localStorage.setItem('wishlist', JSON.stringify(wishlist));
                loadWishlist(); // রিলোড wishlist
            });
        });

        // অ্যানিমেশন ক্লাস যোগ করো
        setTimeout(() => {
            document.querySelectorAll('.card').forEach(card => card.classList.add('show'));
        }, 100);
    }

    // পেজ লোড হলে wishlist দেখাও
    window.onload = loadWishlist;
</script>

</body>
</html>
