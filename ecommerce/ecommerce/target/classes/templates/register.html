<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MyShop</title>
    <link href="/webjars/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
        background: linear-gradient(135deg, #fff5f8, #ffeef5, #fffaf5);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .register-card {
        border: none;
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(255,105,180,0.15);
        background: white;
        max-width: 480px;
        width: 100%;
        opacity: 0;
        transform: translateY(50px);
        animation: fadeInUp 0.8s ease forwards 0.3s;
        }
        @keyframes fadeInUp {
        to { opacity: 1; transform: translateY(0); }
        }
        .card-body {
        padding: 3rem 2.5rem;
        }
        h3 {
        font-weight: 900;
        color: #ff1493;
        text-shadow: 0 2px 10px rgba(255,20,147,0.15);
        margin-bottom: 2rem;
        }
        .form-label {
        font-weight: 700;
        color: #444;
        margin-bottom: 0.6rem;
        }
        .form-control {
        border-radius: 14px;
        padding: 0.85rem 1.4rem;
        border: 1px solid #ddd;
        transition: all 0.3s;
        }
        .form-control:focus {
        border-color: #ff69b4;
        box-shadow: 0 0 0 0.3rem rgba(255,105,180,0.2);
        }
        .btn-pink {
        background: linear-gradient(45deg, #ff69b4, #ff1493);
        border: none;
        font-weight: 700;
        border-radius: 50px;
        padding: 1rem 2.5rem;
        transition: all 0.4s;
        position: relative;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(255,105,180,0.35);
        }
        .btn-pink:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 50px rgba(255,105,180,0.5);
        }
        .btn-pink:active {
        animation: bounce 0.4s ease;
        }
        @keyframes bounce {
        0% { transform: scale(1); }
        40% { transform: scale(1.1); }
        70% { transform: scale(0.95); }
        100% { transform: scale(1); }
        }
        .btn-pink::after {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        width: 0; height: 0;
        background: rgba(255,255,255,0.35);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: width 0.6s ease, height 0.6s ease;
        pointer-events: none;
        }
        .btn-pink:active::after {
        width: 500px;
        height: 500px;
        opacity: 0;
        }
        .alert-danger {
        border-radius: 16px;
        animation: popIn 0.6s ease;
        }
        @keyframes popIn {
        0% { transform: scale(0.8); opacity: 0; }
        60% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(1); }
        }
        .text-center a {
        color: #ff69b4;
        font-weight: 600;
        transition: color 0.3s;
        }
        .text-center a:hover {
        color: #ff1493;
        text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="register-card">
                <div class="card-body">
                    <h3 class="text-center mb-4">Register</h3>

                    <div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>

                    <form th:action="@{/register}" method="post">
                        <div class="mb-4">
                            <label class="form-label fw-bold">Username</label>
                            <input type="text" name="username" class="form-control rounded-pill shadow-sm" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" name="email" class="form-control rounded-pill shadow-sm" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Password</label>
                            <input type="password" name="password" class="form-control rounded-pill shadow-sm" required>
                        </div>

                        <button type="submit" class="btn btn-pink w-100 mt-3">
                            Register
                        </button>
                    </form>

                    <p class="text-center mt-4 mb-0">
                        Already have an account? <a href="/login">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
